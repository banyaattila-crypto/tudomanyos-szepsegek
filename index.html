<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Halhatatlan tudományos szépségek — archívum</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#eef1f7;
    --muted:#9aa6c4;
  }
  /* ---- Domain: matematika (arany/kék) ---- */
  body[data-domain="matek"]{
    --ink:#0b0f1f; --ink-2:#121a33; --panel:#0f1730;
    --line:rgba(196,168,103,0.18);
    --primary:#c9a24b; --primary-bright:#e9c877; --rank-dark:#8a6f2e;
    --highlight:#c9a24b; --highlight-border:rgba(201,162,75,.35);
    --tag-color:#7da3ff; --tag-border:rgba(125,163,255,.28);
    --chip-bg:rgba(125,163,255,0.05); --chip-border:rgba(125,163,255,.22);
    --chip-hover-border:rgba(201,162,75,.45);
    --paper:#eef1f7; --muted:#9aa6c4;
    --bg:
      radial-gradient(1200px 700px at 75% -10%, rgba(125,163,255,0.10), transparent 60%),
      radial-gradient(900px 600px at 0% 110%, rgba(201,162,75,0.08), transparent 55%),
      linear-gradient(180deg, #0b0f1f 0%, #0a0d1a 100%);
  }
  /* ---- Domain: fizika/kémia/biológia (cián/arany) ---- */
  body[data-domain="fizika"]{
    --ink:#080f1c; --ink-2:#0c1526; --panel:#0d1828;
    --line:rgba(100,210,255,0.13);
    --primary:#3eb8f0; --primary-bright:#7fd8ff; --rank-dark:#1a7aaa;
    --highlight:#e0b44a; --highlight-border:rgba(224,180,74,.3);
    --tag-color:#3eb8f0; --tag-border:rgba(62,184,240,.3);
    --chip-bg:rgba(62,184,240,0.05); --chip-border:rgba(62,184,240,.22);
    --chip-hover-border:rgba(224,180,74,.45);
    --paper:#e8f0fa; --muted:#7a9abc;
    --bg:
      radial-gradient(1100px 600px at 80% -5%, rgba(62,184,240,0.09), transparent 60%),
      radial-gradient(800px 500px at -5% 105%, rgba(62,184,240,0.07), transparent 55%),
      linear-gradient(180deg, #080f1c 0%, #050b17 100%);
  }

  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0;
    font-family:"Inter",system-ui,sans-serif;
    color:var(--paper);
    background:var(--bg);
    min-height:100vh;
    padding:clamp(20px,5vw,64px) clamp(16px,5vw,48px);
    line-height:1.5;
    transition:background 1.1s ease, color .5s ease;
  }
  .wrap{max-width:1060px;margin:0 auto;}

  /* ---- Domain switcher ---- */
  .domain-switch{
    display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;
  }
  .dbtn{
    font-family:"Inter",sans-serif;
    font-size:13px;font-weight:600;letter-spacing:.02em;
    color:var(--muted);
    background:var(--chip-bg);
    border:1px solid var(--chip-border);
    padding:10px 20px;border-radius:999px;
    cursor:pointer;transition:all .25s ease;
    user-select:none;
  }
  .dbtn:hover{border-color:var(--chip-hover-border);color:var(--paper);}
  .dbtn.active{
    background:linear-gradient(135deg,var(--primary-bright),var(--primary));
    border-color:transparent;color:var(--ink);
  }
  .grand-total{
    color:var(--muted);font-size:12.5px;margin:0 0 clamp(20px,4vw,32px);
    letter-spacing:.02em;
  }
  .grand-total b{color:var(--highlight);font-weight:600;}

  /* ---- Header ---- */
  header{margin-bottom:clamp(20px,4vw,36px);}
  .eyebrow{
    font-size:12px;letter-spacing:.32em;text-transform:uppercase;
    color:var(--primary);font-weight:600;margin:0 0 14px;
    transition:color .5s ease;
  }
  h1{
    font-family:"Fraunces",serif;
    font-weight:500;
    font-size:clamp(32px,6vw,58px);
    line-height:1.04;
    margin:0 0 16px;
    letter-spacing:-0.01em;
  }
  h1 em{font-style:italic;color:var(--primary-bright);transition:color .5s ease;}
  .sub{
    color:var(--muted);max-width:64ch;font-size:clamp(14px,1.6vw,16px);margin:0;
  }
  .rule{
    height:1px;margin:clamp(24px,4vw,36px) 0 0;
    background:linear-gradient(90deg,var(--primary),transparent 70%);
    transition:background .5s ease;
  }

  /* ---- Filter bar ---- */
  .filterbar{
    display:flex;flex-wrap:wrap;gap:8px;
    margin:clamp(18px,3vw,28px) 0 clamp(20px,3.5vw,32px);
  }
  .chip{
    font-family:"Inter",sans-serif;
    font-size:12.5px;letter-spacing:.02em;
    color:var(--muted);
    background:var(--chip-bg);
    border:1px solid var(--chip-border);
    padding:7px 14px;border-radius:999px;
    cursor:pointer;
    transition:all .2s ease;
    user-select:none;
    white-space:nowrap;
  }
  .chip:hover{
    border-color:var(--chip-hover-border);
    color:var(--paper);
  }
  .chip.active{
    background:linear-gradient(135deg,var(--primary-bright),var(--primary));
    border-color:transparent;
    color:var(--ink);
    font-weight:600;
  }
  .chip .count{
    opacity:.65;font-size:11px;margin-left:5px;
  }
  .chip.active .count{opacity:.55;}
  .count-display{
    color:var(--muted);font-size:13px;margin:0 0 4px;
  }
  .count-display b{color:var(--primary-bright);font-weight:600;}

  /* ---- Rows ---- */
  .grid{margin-top:8px;}
  .row{
    display:grid;
    grid-template-columns:88px 1fr;
    gap:clamp(16px,3vw,34px);
    align-items:center;
    padding:clamp(22px,3.5vw,32px) 4px;
    border-bottom:1px solid var(--line);
    opacity:0;transform:translateY(14px);
    animation:rise .6s cubic-bezier(.2,.7,.2,1) forwards;
    transition:opacity .25s ease, max-height .25s ease, border-color .5s ease;
  }
  .row.hidden{display:none;}
  .row:first-of-type{border-top:1px solid var(--line);}
  @keyframes rise{to{opacity:1;transform:none;}}

  .rank{
    font-family:"Fraunces",serif;
    font-size:clamp(40px,6.4vw,64px);
    font-weight:500;
    line-height:.9;
    color:transparent;
    background:linear-gradient(160deg,var(--primary-bright),var(--primary) 55%,var(--rank-dark));
    -webkit-background-clip:text;background-clip:text;
    text-align:center;
    font-variant-numeric:lining-nums;
    transition:background .5s ease;
  }

  .body{min-width:0;}

  .system-label{
    font-size:10px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--primary);font-weight:600;margin-bottom:2px;
    padding:0 0 4px;
    border-bottom:1px solid var(--line);
  }
  .formula{
    background:linear-gradient(180deg,var(--panel),var(--ink-2));
    border:1px solid var(--line);
    border-radius:14px;
    padding:clamp(15px,2.5vw,25px) clamp(14px,2.5vw,28px);
    margin-bottom:14px;
    overflow-x:auto;
    overflow-y:hidden;
    position:relative;
    transition:background .5s ease, border-color .5s ease;
  }
  .formula.multi{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px 24px;
    align-items:center;
  }
  .formula::-webkit-scrollbar{height:6px;}
  .formula::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
  .katex{color:var(--paper);font-size:clamp(1.03rem,2.4vw,1.58rem);}

  /* Badge / kiemelés (matek) */
  .badge{
    display:inline-block;
    font-size:10px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--ink);background:linear-gradient(135deg,var(--primary-bright),var(--primary));
    padding:3px 10px;border-radius:999px;font-weight:700;margin-left:2px;
    vertical-align:middle;
  }

  .meta{display:flex;flex-wrap:wrap;align-items:baseline;gap:8px 14px;}
  .name{
    font-family:"Fraunces",serif;
    font-size:clamp(18px,2.6vw,24px);
    font-weight:500;
  }
  .tag{
    font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--tag-color);border:1px solid var(--tag-border);
    padding:3px 9px;border-radius:999px;white-space:nowrap;
    transition:color .5s ease, border-color .5s ease;
  }
  .tag.special{
    color:var(--highlight);border-color:var(--highlight-border);
  }
  .why{color:var(--muted);margin:6px 0 0;font-size:clamp(13.5px,1.7vw,15px);}
  .why b{color:var(--primary-bright);font-weight:600;transition:color .5s ease;}

  .scroll-hint{
    font-size:11px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--primary);opacity:.6;margin:-8px 0 6px;
  }

  /* Noether speciális kártya (fizika) */
  .noether-box{
    background:linear-gradient(135deg,rgba(62,184,240,0.07),rgba(62,184,240,0.02));
    border:1px solid rgba(62,184,240,0.22);
    border-radius:14px;
    padding:clamp(16px,2.6vw,24px) clamp(14px,2.6vw,26px);
    margin-bottom:14px;
    font-family:"Fraunces",serif;
    font-size:clamp(16px,2.4vw,21px);
    font-style:italic;
    color:var(--primary-bright);
    line-height:1.45;
  }
  .noether-table{
    margin-top:14px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    font-style:normal;
    font-family:"Inter",sans-serif;
    font-size:clamp(12px,1.4vw,13.5px);
  }
  .nt-item{
    display:flex;gap:8px;align-items:center;
    background:rgba(62,184,240,0.06);
    border-radius:8px;
    padding:8px 12px;
    color:var(--muted);
  }
  .nt-sym{color:var(--primary-bright);font-weight:600;min-width:12px;}
  .nt-arrow{color:var(--primary);opacity:.6;}

  .empty-state{
    color:var(--muted);font-size:14px;padding:40px 4px;text-align:center;
    display:none;
  }

  footer{
    margin-top:clamp(30px,5vw,52px);
    color:var(--muted);font-size:13px;
    display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;
  }
  footer span{color:var(--primary);transition:color .5s ease;}

  @media(max-width:560px){
    .row{grid-template-columns:54px 1fr;gap:12px;}
    .rank{font-size:34px;}
    .filterbar{gap:6px;}
    .chip{font-size:11.5px;padding:6px 11px;}
    .dbtn{font-size:12px;padding:8px 16px;}
  }
  @media(prefers-reduced-motion:reduce){
    .row{animation:none;opacity:1;transform:none;}
    body,.tag,.formula,.rank,h1 em,.rule,.eyebrow,footer span,.why b{transition:none;}
  }
</style>
</head>
<body data-domain="matek">
<div class="wrap">

  <div class="domain-switch" id="domainSwitch">
    <button type="button" class="dbtn active" data-domain="matek">Matematika</button>
    <button type="button" class="dbtn" data-domain="fizika">Fizika · Kémia · Biológia</button>
  </div>
  <p class="grand-total" id="grandTotal"></p>

  <header>
    <p class="eyebrow" id="eyebrow"></p>
    <h1 id="title"></h1>
    <p class="sub" id="subtitle"></p>
    <div class="rule"></div>
  </header>

  <div class="filterbar" id="filterbar"></div>
  <p class="count-display" id="countDisplay"></p>

  <main class="grid" id="grid"></main>
  <p class="empty-state" id="emptyState">Nincs tétel ebben a kategóriában.</p>

  <footer>
    <div id="footerCount">Szedés: KaTeX</div>
    <div id="footerNames"><span></span></div>
  </footer>
</div>

<script>
// ==== ADATOK: MATEMATIKA ====
const MATEK_DATA = [

  {

    tex: "\\hat{f}(\\xi) = \\int_{-\\infty}^{\\infty} f(x)\\,e^{-2\\pi i x \\xi}\\,dx",

    why: "<b>Teljesen őrültnek tűnik — mégis igaz.</b> Ramanujan bizonyítás nélkül írta le. Hihetetlen konvergenciasebességgel közelíti π-t: minden tag ~8 új tizedesjegyet ad."

  },
  {

  },
  {
    name: "Cauchy-integrálformula",
    tag: "Komplex analízis",
    category: "analizis",
    tex: "f(z) = \\frac{1}{2\\pi i}\\oint_{\\gamma}\\frac{f(\\zeta)}{\\zeta - z}\\,d\\zeta",
    why: "<b>A perem meghatározza a belsőt.</b> Egy komplex függvény értéke a tartomány belsejében teljes egészében kiszámítható a határon felvett értékekből. FEM szempontból is mélyen releváns."
  },
  {
    name: "Pitagorasz általánosítása",
    tag: "Geometria · trigonometria",
    category: "kombinatorika-geometria",
    tex: "c^2 = a^2 + b^2 - 2ab\\cos\\gamma",
    why: "<b>Az általánosabb tartalmazza a speciálist.</b> γ = 90° esetén visszakapjuk a Pitagorasz-tételt. Szép mert a struktúra hierarchikus — egy képlet leírja az egész síkgeometriát."
  },
  {
    name: "Stirling-közelítés",
    tag: "Kombinatorika · aszimptotika",
    category: "kombinatorika-geometria",
    tex: "n! \\approx \\sqrt{2\\pi n}\\left(\\frac{n}{e}\\right)^{n}",
    why: "<b>π és e együtt, ott ahol nem várod.</b> Nagy faktoriálisok közelítése — a √(2π) a Gauss-integrálból bukkan elő. Két nagy konstans kombinatorikai kontextusban."
  },
  {
    name: "Basel-probléma",
    tag: "Sorok · Euler · 1734",

    tex: "\\sum_{n=1}^{\\infty}\\frac{1}{n^2} = \\frac{\\pi^2}{6}",

  },
  {
    name: "Gauss–Bonnet-tétel",
    tag: "Differenciálgeometria · topológia",

    tex: "\\int_M K\\,dA = 2\\pi\\,\\chi(M)",
    why: "<b>Lokális görbület → globális topológia.</b> A teljes Gauss-görbület differenciálgeometriai, az Euler-karakterisztika tisztán topológiai — mégis egyenlők. Hajlíthatod a felületet ahogy akarod, a totális görbület megmarad. A poliéder-formula folytonos rokona."

  {

  },

    name: "Általánosított Stokes-tétel",
    tag: "Differenciálformák · egyesítés",
    category: "analizis",
    tex: "\\int_{M} d\\omega = \\int_{\\partial M} \\omega",

  },
  {
    name: "Fermat–Wiles-tétel",
    tag: "Számelmélet · 1637 → 1994",
    category: "szamelmelet",
    tex: "x^n + y^n = z^n \\;\\;\\text{nem megoldható}\\; n>2",
    why: "<b>358 év a margótól a bizonyításig.</b> Fermat azt írta, csodás bizonyítása van, de a margó túl szűk. Andrew Wiles 1994-ben oldotta meg — moduláris formák és elliptikus görbék összekapcsolásával. A leghosszabb nyitott rejtély, ami valaha lezárult."
  },
  {
    name: "Gödel első nemteljességi tétele",
    tag: "Matematikai logika · 1931",
    category: "logika-halmaz",
    tex: "\\exists\\, G:\\;\\; \\nvdash_{T} G \\;\\;\\text{és}\\;\\; \\nvdash_{T} \\lnot G",

  },
  {
    name: "Bayes-tétel",
    tag: "Valószínűségszámítás · 1763",
    category: "valoszinuseg",
    tex: "P(A\\mid B) = \\frac{P(B\\mid A)\\,P(A)}{P(B)}",
    why: "<b>Hogyan frissítsd a hiteidet bizonyíték alapján.</b> Egyetlen törtből az egész modern statisztika, gépi tanulás és tudományos következtetés kiindul. Egyszerű algebra — mégis ez a racionális gondolkodás matematikai magja."
  },
  {
    name: "Liouville-tétel",
    tag: "Komplex analízis · 1844",
    category: "analizis",
    tex: "f \\;\\text{egész és korlátos} \\;\\Rightarrow\\; f \\equiv \\text{konstans}",

  },
  {
    name: "Cayley-formula",
    tag: "Kombinatorika · gráfelmélet",
    category: "kombinatorika-geometria",
    tex: "n^{\\,n-2}",
    why: "<b>Egyetlen kifejezés, brutális egyszerűség.</b> Ennyi feszítőfa létezik n címkézett csúcsú teljes gráfon. A bizonyítás (Prüfer-kód) maga is gyönyörű bijekció a fák és sorozatok között."
  },
  {
    name: "Borsuk–Ulam-tétel",
    tag: "Topológia · fixpont",
    category: "topologia",
    tex: "\\forall f:S^n\\!\\to\\!\\mathbb{R}^n \\;\\exists x:\\, f(x)=f(-x)",
    why: "<b>A Föld bármely pillanatban két átellenes pontján egyenlő hőmérséklet és légnyomás van.</b> Folytonos leképzésnél a gömbön mindig található antipodális pontpár, ahol a függvényértékek megegyeznek — tiszta topológia, meglepő fizikai következménnyel."

  {

const grid = document.getElementById("grid");
const filterbar = document.getElementById("filterbar");
const countDisplay = document.getElementById("countDisplay");
const emptyState = document.getElementById("emptyState");
const eyebrowEl = document.getElementById("eyebrow");
const titleEl = document.getElementById("title");
const subtitleEl = document.getElementById("subtitle");
const footerCountEl = document.getElementById("footerCount");
const footerNamesEl = document.getElementById("footerNames").querySelector("span");
const grandTotalEl = document.getElementById("grandTotal");
const domainSwitch = document.getElementById("domainSwitch");

let activeDomain = "matek";
let activeCategory = "all";
let rowElements = [];

function buildRow(entry, index) {
  const rank = entry.rank !== undefined ? entry.rank : index + 1;
  const row = document.createElement("div");
  row.className = "row";
  row.style.animationDelay = (Math.min(index, 14) * 0.06) + "s";
  row.dataset.category = entry.category;

  const rankEl = document.createElement("div");
  rankEl.className = "rank";
  rankEl.textContent = rank;

  const body = document.createElement("div");
  body.className = "body";

  if (entry.type === "maxwell") {
    const fWrap = document.createElement("div");
    fWrap.className = "formula multi";
    const label = document.createElement("div");
    label.className = "system-label";
    label.style.gridColumn = "1 / -1";
    label.textContent = "négy egyenlet · teljes elektromágnesség";
    fWrap.appendChild(label);
    entry.equations.forEach(eq => {
      const span = document.createElement("div");
      fWrap.appendChild(span);
      katex.render(eq, span, {throwOnError: false, displayMode: true});
    });
    body.appendChild(fWrap);

    const derBox = document.createElement("div");
    derBox.style.cssText = "font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--primary);margin:-4px 0 8px;opacity:.7;";
    derBox.textContent = "ebből következik →";
    body.appendChild(derBox);
    const derF = document.createElement("div");
    derF.className = "formula";
    derF.style.marginBottom = "14px";
    katex.render(entry.derived, derF, {throwOnError: false, displayMode: true});
    body.appendChild(derF);

  } else if (entry.type === "noether") {
    const box = document.createElement("div");
    box.className = "noether-box";
    box.innerHTML = `„${entry.quote}"`;
    const nt = document.createElement("div");
    nt.className = "noether-table";
    entry.pairs.forEach(p => {
      const item = document.createElement("div");
      item.className = "nt-item";
      item.innerHTML = `<span class="nt-sym">${p.sym}</span><span class="nt-arrow">${p.arrow}</span><span>${p.law}</span>`;
      nt.appendChild(item);
    });
    box.appendChild(nt);
    body.appendChild(box);

  } else {
    if (entry.scrollHint) {
      const hint = document.createElement("div");
      hint.className = "scroll-hint";
      hint.textContent = "← görgethető →";
      body.appendChild(hint);
    }
    const fEl = document.createElement("div");
    fEl.className = "formula";
    katex.render(entry.tex, fEl, {throwOnError: false, displayMode: true});
    body.appendChild(fEl);
  }

  const meta = document.createElement("div");
  meta.className = "meta";
  const nameEl = document.createElement("span");
  nameEl.className = "name";
  nameEl.textContent = entry.name;
  meta.appendChild(nameEl);
  if (entry.badge) {
    const b = document.createElement("span");
    b.className = "badge";
    b.textContent = entry.badge;
    meta.appendChild(b);
  }
  const tagEl = document.createElement("span");
  tagEl.className = "tag" + ((entry.mega || entry.special) ? " special" : "");
  tagEl.textContent = entry.tag;
  meta.appendChild(tagEl);
  body.appendChild(meta);

  const why = document.createElement("p");
  why.className = "why";
  why.innerHTML = entry.why;
  body.appendChild(why);

  row.appendChild(rankEl);
  row.appendChild(body);
  return row;
}

function buildFilterBar(domainKey) {
  const domain = DOMAINS[domainKey];
  filterbar.innerHTML = "";
  const counts = {};
  domain.data.forEach(d => { counts[d.category] = (counts[d.category] || 0) + 1; });

  const allChip = document.createElement("span");
  allChip.className = "chip active";
  allChip.dataset.cat = "all";
  allChip.innerHTML = `Összes<span class="count">${domain.data.length}</span>`;
  filterbar.appendChild(allChip);

  domain.categoryOrder.forEach(key => {
    if (!counts[key]) return;
    const chip = document.createElement("span");
    chip.className = "chip";
    chip.dataset.cat = key;
    chip.innerHTML = `${domain.categoryLabels[key]}<span class="count">${counts[key]}</span>`;
    filterbar.appendChild(chip);
  });
}

function applyFilter() {
  const domain = DOMAINS[activeDomain];
  let visibleCount = 0;
  rowElements.forEach(({el, category}) => {
    const show = activeCategory === "all" || category === activeCategory;
    el.classList.toggle("hidden", !show);
    if (show) visibleCount++;
  });
  emptyState.style.display = visibleCount === 0 ? "block" : "none";
  countDisplay.innerHTML = activeCategory === "all"
    ? `<b>${domain.data.length}</b> tétel összesen`
    : `<b>${visibleCount}</b> tétel a "${domain.categoryLabels[activeCategory]}" kategóriában`;
}

function renderDomain(domainKey) {
  const domain = DOMAINS[domainKey];
  activeDomain = domainKey;
  activeCategory = "all";

  document.body.dataset.domain = domainKey;
  [...domainSwitch.children].forEach(b => b.classList.toggle("active", b.dataset.domain === domainKey));

  eyebrowEl.textContent = `${domain.eyebrowText} · ${domain.data.length} tétel`;
  titleEl.innerHTML = domain.titleHTML;
  subtitleEl.innerHTML = domain.subHTML;
  footerCountEl.textContent = `Szedés: KaTeX · ${domain.data.length} tétel`;
  footerNamesEl.textContent = domain.footerNames;

  grid.innerHTML = "";
  rowElements = [];
  domain.data.forEach((d, i) => {
    const row = buildRow(d, i);
    grid.appendChild(row);
    rowElements.push({el: row, category: d.category});
  });

  buildFilterBar(domainKey);
  applyFilter();
}

filterbar.addEventListener("click", (e) => {
  const chip = e.target.closest(".chip");
  if (!chip) return;
  activeCategory = chip.dataset.cat;
  [...filterbar.children].forEach(c => c.classList.toggle("active", c === chip));
  applyFilter();
});

domainSwitch.addEventListener("click", (e) => {
  const btn = e.target.closest(".dbtn");
  if (!btn || btn.dataset.domain === activeDomain) return;
  renderDomain(btn.dataset.domain);
});

function init() {
  const total = MATEK_DATA.length + FIZIKA_DATA.length;
  grandTotalEl.innerHTML = `Összesen <b>${total}</b> halhatatlan tudományos szépség a két gyűjteményben`;
  renderDomain("matek");
}

if (window.katex) {
  init();
} else {
  document.addEventListener("DOMContentLoaded", () => {
    const check = setInterval(() => {
      if (window.katex) { clearInterval(check); init(); }
    }, 50);
  });
}

</script>
